{% extends "base.html" %}

{% block title %}Network Visualizer{% endblock %}

{% block content %}

<div class="network-page">
    <h1>Neural Network Visualizer</h1>
    <p>Choose the number of layers and neurons per layer.</p>

    <div class="controls">
        <div class="control-group">
            <label for="layerCount">Number of layers</label>
            <input type="number" id="layerCount" value="3" min="1">
        </div>

        <div class="control-group">
            <label for="neuronsPerLayer">Neurons per layer</label>
            <input type="text" id="neuronsPerLayer" value="4,5,2">
        </div>

        <button class="render-btn" onclick="renderNetwork()">Render Network</button>
    </div>

    <div class="network-wrapper">
        <svg id="connectionLayer"></svg>
        <div id="networkContainer"></div>
    </div>
</div>

<script>
function renderNetwork() {
    const layerCount = parseInt(document.getElementById("layerCount").value);
    const neuronInput = document.getElementById("neuronsPerLayer").value;

    const neuronCounts = neuronInput
        .split(",")
        .map(n => parseInt(n.trim()))
        .filter(n => !isNaN(n));

    const container = document.getElementById("networkContainer");
    const svg = document.getElementById("connectionLayer");

    container.innerHTML = "";
    svg.innerHTML = "";

    if (neuronCounts.length !== layerCount) {
        container.innerHTML = "<p class='error-message'>Layer count must match neuron list.</p>";
        return;
    }

    const layers = [];
    const maxNeurons = Math.max(...neuronCounts);

    neuronCounts.forEach((count, index) => {
        const layer = document.createElement("div");
        layer.className = "layer-column";

        const label = document.createElement("div");
        label.className = "layer-label";

        if (index === 0) {
            label.textContent = "Input";
        } else if (index === neuronCounts.length - 1) {
            label.textContent = "Output";
        } else {
            label.textContent = "Hidden " + index;
        }

        layer.appendChild(label);

        const neuronContainer = document.createElement("div");
        neuronContainer.className = "neuron-stack";
        neuronContainer.style.height = (maxNeurons * 54) + "px";

        const neurons = [];

        for (let i = 0; i < count; i++) {
            const neuron = document.createElement("div");
            neuron.className = "neuron";

            if (index === 0) {
                neuron.classList.add("input-neuron");
            } else if (index === neuronCounts.length - 1) {
                neuron.classList.add("output-neuron");
            } else {
                neuron.classList.add("hidden-neuron");
            }

            neuron.textContent = i + 1;

            neuronContainer.appendChild(neuron);
            neurons.push(neuron);
        }

        layer.appendChild(neuronContainer);
        container.appendChild(layer);
        layers.push(neurons);
    });

    setTimeout(() => drawConnections(layers, svg), 50);
}

function drawConnections(layers, svg) {
    const svgRect = svg.getBoundingClientRect();

    for (let i = 0; i < layers.length - 1; i++) {
        const currentLayer = layers[i];
        const nextLayer = layers[i + 1];

        currentLayer.forEach(fromNeuron => {
            const fromRect = fromNeuron.getBoundingClientRect();

            nextLayer.forEach(toNeuron => {
                const toRect = toNeuron.getBoundingClientRect();

                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");

                line.setAttribute("x1", fromRect.right - svgRect.left);
                line.setAttribute("y1", fromRect.top + fromRect.height / 2 - svgRect.top);

                line.setAttribute("x2", toRect.left - svgRect.left);
                line.setAttribute("y2", toRect.top + toRect.height / 2 - svgRect.top);

                line.setAttribute("stroke", "#b0b0b0");
                line.setAttribute("stroke-width", "1");

                svg.appendChild(line);
            });
        });
    }
}

window.onload = renderNetwork;
</script>
{% endblock %}
