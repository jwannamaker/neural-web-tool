{% extends "base.html" %}

{% block title %}Network Visualizer{% endblock %}

{% block content %}
<style>
    .network-page {
        max-width: 1000px;
        margin: 20px auto;
    }

    .network-header {
        text-align: center;
        margin-bottom: 20px;
        color: white;
    }

    .network-header h1 {
        font-size: 2.5rem;
        margin-bottom: 5px;
        text-shadow: 2px 2px #000;
    }

    .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        align-items: flex-end;
        margin-bottom: 10px;
    }

    .control-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    .control-group label {
        font-weight: bold;
    }

    .network-wrapper {
        position: relative;
        border: 2px solid;
        border-color: var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);
        background: #fff;
        padding: 40px;
        min-height: 480px;
        overflow-x: auto;
    }

    #connectionLayer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
    }

    #networkContainer {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 120px;
        min-height: 400px;
    }

    .layer-column {
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 1;
    }

    .layer-label {
        font-weight: bold;
        margin-bottom: 15px;
        font-size: 12px;
        background: var(--win-bg);
        border: 2px solid;
        border-color: var(--win-border-light) var(--win-border-darker) var(--win-border-darker) var(--win-border-light);
        padding: 4px 10px;
    }

    .neuron-stack {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 20px;
    }

    .neuron {
        width: 40px;
        height: 40px;
        background-color: var(--win-bg);
        border: 2px solid;
        border-color: var(--win-border-light) var(--win-border-darker) var(--win-border-darker) var(--win-border-light);
        box-shadow: inset 1px 1px var(--win-border-light), inset -1px -1px var(--win-border-dark);
        border-radius: 50%;
        font-size: 14px;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.1s ease;
    }

    .neuron:hover {
        transform: scale(1.1);
        border-color: var(--win-border-darker) var(--win-border-light) var(--win-border-light) var(--win-border-darker);
    }

    .input-neuron {
        background: var(--win-teal);
        color: white;
    }

    .hidden-neuron {
        background: var(--win-bg);
    }

    .output-neuron {
        background: var(--win-blue-start);
        color: white;
    }

    .error-message {
        color: #ef4444;
        font-weight: bold;
    }
</style>

<div class="network-page">
    <div class="network-header">
        <h1>Network Visualizer</h1>
    </div>

    <div class="window">
        <div class="window-title">
            <span><img src="https://win98icons.alexmeub.com/icons/png/spider-0.png" width="16" height="16" style="vertical-align: middle; margin-right: 5px;"> Network Configuration</span>
        </div>
        <div class="window-content">
            <p style="margin-top: 0; margin-bottom: 15px;">Specify the number of layers and neurons per layer to visualize the architecture.</p>
            <div class="controls">
                <div class="control-group">
                    <label for="layerCount">Number of layers</label>
                    <input type="number" id="layerCount" value="3" min="1" class="input-win" style="width: 100px;">
                </div>

                <div class="control-group">
                    <label for="neuronsPerLayer">Neurons per layer (comma-separated)</label>
                    <input type="text" id="neuronsPerLayer" value="4,5,2" class="input-win" style="width: 250px;">
                </div>

                <button class="btn-win" onclick="renderNetwork()" style="font-weight: bold; margin-bottom: 2px;">Render</button>
            </div>
        </div>
    </div>

    <div class="window">
        <div class="window-title">
            <span>Visualization</span>
        </div>
        <div class="window-content" style="padding: 10px;">
            <div class="network-wrapper">
                <svg id="connectionLayer"></svg>
                <div id="networkContainer"></div>
            </div>
        </div>
    </div>
</div>

<script>
function renderNetwork() {
    const layerCount = parseInt(document.getElementById("layerCount").value);
    const neuronInput = document.getElementById("neuronsPerLayer").value;

    const neuronCounts = neuronInput
        .split(",")
        .map(n => parseInt(n.trim()))
        .filter(n => !isNaN(n));

    const container = document.getElementById("networkContainer");
    const svg = document.getElementById("connectionLayer");

    container.innerHTML = "";
    svg.innerHTML = "";

    if (neuronCounts.length !== layerCount) {
        container.innerHTML = "<p class='error-message'>Layer count must match neuron list.</p>";
        return;
    }

    const layers = [];
    const maxNeurons = Math.max(...neuronCounts);

    neuronCounts.forEach((count, index) => {
        const layer = document.createElement("div");
        layer.className = "layer-column";

        const label = document.createElement("div");
        label.className = "layer-label";

        if (index === 0) {
            label.textContent = "Input";
        } else if (index === neuronCounts.length - 1) {
            label.textContent = "Output";
        } else {
            label.textContent = "Hidden " + index;
        }

        layer.appendChild(label);

        const neuronContainer = document.createElement("div");
        neuronContainer.className = "neuron-stack";
        neuronContainer.style.height = (maxNeurons * 54) + "px";

        const neurons = [];

        for (let i = 0; i < count; i++) {
            const neuron = document.createElement("div");
            neuron.className = "neuron";

            if (index === 0) {
                neuron.classList.add("input-neuron");
            } else if (index === neuronCounts.length - 1) {
                neuron.classList.add("output-neuron");
            } else {
                neuron.classList.add("hidden-neuron");
            }

            neuron.textContent = i + 1;

            neuronContainer.appendChild(neuron);
            neurons.push(neuron);
        }

        layer.appendChild(neuronContainer);
        container.appendChild(layer);
        layers.push(neurons);
    });

    setTimeout(() => drawConnections(layers, svg), 50);
}

function drawConnections(layers, svg) {
    const svgRect = svg.getBoundingClientRect();

    for (let i = 0; i < layers.length - 1; i++) {
        const currentLayer = layers[i];
        const nextLayer = layers[i + 1];

        currentLayer.forEach(fromNeuron => {
            const fromRect = fromNeuron.getBoundingClientRect();

            nextLayer.forEach(toNeuron => {
                const toRect = toNeuron.getBoundingClientRect();

                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");

                line.setAttribute("x1", fromRect.right - svgRect.left);
                line.setAttribute("y1", fromRect.top + fromRect.height / 2 - svgRect.top);

                line.setAttribute("x2", toRect.left - svgRect.left);
                line.setAttribute("y2", toRect.top + toRect.height / 2 - svgRect.top);

                line.setAttribute("stroke", "#808080");
                line.setAttribute("stroke-width", "2");

                svg.appendChild(line);
            });
        });
    }
}

window.onload = renderNetwork;
</script>
{% endblock %}
