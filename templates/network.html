{% extends "base.html" %}

{% block title %}Network Visualizer{% endblock %}

{% block content %}

<style>
h1 {
    font-size: 32px;
}

#networkContainer {
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:90px;
    border:1px solid #ccc;
    padding:40px;
    min-height:420px;
    margin: 0 auto;
    max-width: 900px;
}
</style>

<h1>Neural Network Visualizer</h1>

<div style="display:flex; gap:20px; align-items:center;">
    <div>
        <label>Number of layers</label><br>
        <input type="number" id="layerCount" value="3" style="padding:10px; width:200px;">
    </div>

    <div>
        <label>Neurons per layer</label><br>
        <input type="text" id="neuronsPerLayer" value="4,5,2" style="padding:10px; width:300px;">
    </div>

    <button onclick="sendToBackend()" style="
        padding:12px 24px;
        margin-top:18px;
        background-color:#2563eb;
        color:white;
        border:none;
        border-radius:8px;
        cursor:pointer;
    ">
        Render Network
    </button>
</div>

<br><br>

<div style="position: relative;">
    <svg id="connectionLayer" style="
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;
        pointer-events:none;
    "></svg>

    <div style="display:flex; gap:40px; align-items:flex-start; justify-content:center; margin-top:20px;">

    <div style="position: relative;">
        <svg id="connectionLayer" style="
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            pointer-events:none;
        "></svg>

        <div id="networkContainer"></div>
    </div>
    <div id="outputBox" style="
        min-width:200px;
        padding:20px;
        border:1px solid #ccc;
        border-radius:8px;
        background:#f9fafb;
    ">
        <h3>Prediction Output</h3>
        <p>Run the network to see results</p>
    </div>

</div>
</div>

<script>
let allLines = [];
let neuronMap = new Map();

function renderNetwork() {
    const layerCount = parseInt(document.getElementById("layerCount").value);
    const neuronInput = document.getElementById("neuronsPerLayer").value;

    const neuronCounts = neuronInput
        .split(",")
        .map(n => parseInt(n.trim()))
        .filter(n => !isNaN(n));

    const container = document.getElementById("networkContainer");
    const svg = document.getElementById("connectionLayer");

    container.innerHTML = "";
    svg.innerHTML = "";
    allLines = [];
    neuronMap.clear();

    if (neuronCounts.length !== layerCount) {
        container.innerHTML = "<p>Layer count must match neuron list</p>";
        return;
    }

    const layers = [];

    neuronCounts.forEach((count, layerIndex) => {
        const layer = document.createElement("div");
        layer.style.display = "flex";
        layer.style.flexDirection = "column";
        layer.style.alignItems = "center";
        layer.style.gap = "18px";

        const label = document.createElement("div");
        label.style.fontWeight = "bold";
        label.style.marginBottom = "10px";

        if (layerIndex === 0) label.textContent = "Input";
        else if (layerIndex === neuronCounts.length - 1) label.textContent = "Output";
        else label.textContent = "Hidden " + layerIndex;

        layer.appendChild(label);

        const neurons = [];

        for (let i = 0; i < count; i++) {
            const neuron = document.createElement("div");

            neuron.style.width = "52px";
            neuron.style.height = "34px";
            neuron.style.border = "2px solid black";
            neuron.style.borderRadius = "12px";
            neuron.style.backgroundColor =
                layerIndex === 0 ? "#dbeafe" :
                layerIndex === neuronCounts.length - 1 ? "#d1fae5" :
                "#f3f4f6";

            neuron.style.display = "flex";
            neuron.style.alignItems = "center";
            neuron.style.justifyContent = "center";
            neuron.style.cursor = "pointer";
            neuron.style.transition = "transform 0.15s ease";

            neuron.textContent = i + 1;

            neuron.addEventListener("mouseenter", () => {
                neuron.style.transform = "scale(1.1)";
                highlightConnections(neuron);
            });

            neuron.addEventListener("mouseleave", () => {
                neuron.style.transform = "scale(1)";
                resetConnections();
            });

            layer.appendChild(neuron);
            neurons.push(neuron);
        }

        container.appendChild(layer);
        layers.push(neurons);
    });


    setTimeout(() => drawConnections(layers, svg), 50);
}

function drawConnections(layers, svg) {
    const svgRect = svg.getBoundingClientRect();

    for (let i = 0; i < layers.length - 1; i++) {
        const currentLayer = layers[i];
        const nextLayer = layers[i + 1];

        currentLayer.forEach(fromNeuron => {
            const fromRect = fromNeuron.getBoundingClientRect();

            nextLayer.forEach(toNeuron => {
                const toRect = toNeuron.getBoundingClientRect();

                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");

                line.setAttribute("x1", fromRect.right - svgRect.left);
                line.setAttribute("y1", fromRect.top + fromRect.height / 2 - svgRect.top);
                line.setAttribute("x2", toRect.left - svgRect.left);
                line.setAttribute("y2", toRect.top + toRect.height / 2 - svgRect.top);

                line.setAttribute("stroke", "black");
                line.setAttribute("stroke-width", "0.8");

                svg.appendChild(line);

                allLines.push(line);

                if (!neuronMap.has(fromNeuron)) neuronMap.set(fromNeuron, []);
                if (!neuronMap.has(toNeuron)) neuronMap.set(toNeuron, []);

                neuronMap.get(fromNeuron).push(line);
                neuronMap.get(toNeuron).push(line);
            });
        });
    }
}

function highlightConnections(neuron) {
    const connected = neuronMap.get(neuron) || [];

    allLines.forEach(line => {
        if (connected.includes(line)) {
            line.setAttribute("stroke", "#2563eb");
            line.setAttribute("stroke-width", "2");
        } else {
            line.setAttribute("stroke", "black");
            line.setAttribute("stroke-width", "0.8");
        }
    });
}

function resetConnections() {
    allLines.forEach(line => {
        line.setAttribute("stroke", "black");
        line.setAttribute("stroke-width", "0.8");
    });
}

function sendToBackend() {
    const layerCount = parseInt(document.getElementById("layerCount").value);
    const neuronInput = document.getElementById("neuronsPerLayer").value;

    const neuronCounts = neuronInput
        .split(",")
        .map(n => parseInt(n.trim()))
        .filter(n => !isNaN(n));

    fetch('/api/network', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            layers: layerCount,
            neurons: neuronCounts
        })
    })
    .then(res => res.json())
    .then(data => {
        console.log("Backend response:", data);

        renderNetwork();

        if (data.output) {
            const box = document.getElementById("outputBox");

            box.innerHTML = "<h3>Prediction Output</h3>" +
                data.output.map((val, i) => 
                    `<div>Neuron ${i+1}: <strong>${val.toFixed(4)}</strong></div>`
                ).join("");
        }
    })
    .catch(err => console.error(err));
}
</script>

{% endblock %}
