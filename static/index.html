<!DOCTYPE html>
<html>
<head>
    <title>Neural Web Tool</title>
    <style>
        .tab-content { display: none; padding: 20px; border: 1px solid #ccc; }
        .active { display: block; }
        .tab-btn.selected { background-color: #ddd; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Neural Web Tool</h1>

    <button class="tab-btn selected" onclick="showTab('guided', this)">Learning</button>
    <button class="tab-btn" onclick="showTab('sandbox', this)">Sandbox</button>
    <button class="tab-btn" onclick="showTab('about', this)">About</button>

    <hr>

    <div id="guided" class="tab-content active">
        <h3>Learning</h3>
        <p>Content</p>
    </div>

    <div id="sandbox" class="tab-content">
        <h3>Sandbox</h3>
        <p>Content</p>
    </div>

    <div id="about" class="tab-content">
        <h3>About</h3>
        <p>Content</p>
    </div>

    <script>
        function showTab(tabId, btn) {
            // Hide all content
            var contents = document.getElementsByClassName('tab-content');
            for (var i = 0; i < contents.length; i++) {
                contents[i].classList.remove('active');
            }
            
            // Remove selection from all buttons
            var buttons = document.getElementsByClassName('tab-btn');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('selected');
            }

            // Show current tab and highlight button
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('selected');
        }
    </script>

</body>
</html>
