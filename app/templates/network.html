{% extends "base.html" %}

{% block title %}Network Visualizer{% endblock %}

{% block content %}

<style>
h1 {
    font-size: 32px;
}

#networkContainer {
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:90px;
    border:1px solid #ccc;
    padding:40px;
    min-height:420px;
    margin: 0 auto;
    max-width: 900px;
}
</style>

<h1>Neural Network Visualizer</h1>

<div style="display:flex; gap:20px; align-items:center;">
    <div>
        <label>Number of layers</label><br>
        <input type="number" id="layerCount" value="3" style="padding:10px; width:200px;">
    </div>

    <div>
        <label>Neurons per layer</label><br>
        <input type="text" id="neuronsPerLayer" value="784,128,10" style="padding:10px; width:300px;">
    </div>

    <button onclick="trainNetwork()">Train Network</button>

    <button onclick="sendToBackend()" style="
        padding:12px 24px;
        margin-top:18px;
        background-color:#2563eb;
        color:white;
        border:none;
        border-radius:8px;
        cursor:pointer;
    ">
        Render Network
    </button>
</div>

<br><br>

<!-- MAIN VISUAL AREA -->
<div style="display:flex; gap:40px; align-items:flex-start; justify-content:center;">

    <!-- NETWORK + SVG -->
    <div style="position: relative;">

        <!-- SVG LINES -->
        <svg id="connectionLayer"
            style="
                position:absolute;
                top:0;
                left:0;
                width:100%;
                height:100%;
                pointer-events:none;
            ">
        </svg>

        <!-- NEURONS -->
        <div id="networkContainer"></div>

    </div>

    <!-- OUTPUT BOX -->
    <div id="outputBox" style="
        min-width:200px;
        padding:20px;
        border:1px solid #ccc;
        border-radius:8px;
        background:#f9fafb;
    ">
        <h3>Prediction Output</h3>
        <p>Run the network to see results</p>
    </div>

</div>

<script>
let allLines = [];
let neuronMap = new Map();
let networkWeights = [];

function renderNetwork() {
    const MAX_NEURONS = 12;

    const neuronCounts = document
        .getElementById("neuronsPerLayer")
        .value
        .split(",")
        .map(n => Math.min(parseInt(n.trim()), MAX_NEURONS))
        .filter(n => !isNaN(n));

    const container = document.getElementById("networkContainer");
    const svg = document.getElementById("connectionLayer");

    container.innerHTML = "";
    svg.innerHTML = "";
    allLines = [];
    neuronMap.clear();

    const layers = [];

    neuronCounts.forEach((count, layerIndex) => {
        const layer = document.createElement("div");
        layer.style.display = "flex";
        layer.style.flexDirection = "column";
        layer.style.alignItems = "center";
        layer.style.gap = "18px";

        const label = document.createElement("div");
        label.style.fontWeight = "bold";

        if (layerIndex === 0) label.textContent = "Input";
        else if (layerIndex === neuronCounts.length - 1) label.textContent = "Output";
        else label.textContent = "Hidden " + layerIndex;

        layer.appendChild(label);

        const neurons = [];

        for (let i = 0; i < count; i++) {
            const neuron = document.createElement("div");

            neuron.style.cursor = "pointer";

            neuron.addEventListener("mouseenter", () => {
                highlightConnections(neuron);
            });

            neuron.addEventListener("mouseleave", () => {
                resetConnections();
            });

            neuron.style.width = "52px";
            neuron.style.height = "34px";
            neuron.style.border = "2px solid black";
            neuron.style.borderRadius = "12px";
            neuron.style.backgroundColor =
                layerIndex === 0 ? "#dbeafe" :
                layerIndex === neuronCounts.length - 1 ? "#d1fae5" :
                "#f3f4f6";

            neuron.style.display = "flex";
            neuron.style.alignItems = "center";
            neuron.style.justifyContent = "center";
            neuron.textContent = i + 1;

            layer.appendChild(neuron);
            neurons.push(neuron);
        }

        container.appendChild(layer);
        layers.push(neurons);
    });

    setTimeout(() => drawConnections(layers, svg), 50);
}

function drawConnections(layers, svg) {
    const svgRect = svg.getBoundingClientRect();

    for (let i = 0; i < layers.length - 1; i++) {
        layers[i].forEach((fromNeuron, fromIndex) => {
            const fromRect = fromNeuron.getBoundingClientRect();

            layers[i + 1].forEach((toNeuron, toIndex) => {
                const toRect = toNeuron.getBoundingClientRect();

                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");

                line.setAttribute("x1", fromRect.right - svgRect.left);
                line.setAttribute("y1", fromRect.top + fromRect.height / 2 - svgRect.top);
                line.setAttribute("x2", toRect.left - svgRect.left);
                line.setAttribute("y2", toRect.top + toRect.height / 2 - svgRect.top);

                line.setAttribute("stroke", "black");
                line.setAttribute("stroke-width", "1");

                // 🔥 attach weight safely
                if (networkWeights[i] && networkWeights[i][toIndex]) {
                    const weight = networkWeights[i][toIndex][fromIndex];
                    line.dataset.weight = weight;
                }

                svg.appendChild(line);
                allLines.push(line);

                // 🔥 map connections
                if (!neuronMap.has(fromNeuron)) neuronMap.set(fromNeuron, []);
                if (!neuronMap.has(toNeuron)) neuronMap.set(toNeuron, []);

                neuronMap.get(fromNeuron).push(line);
                neuronMap.get(toNeuron).push(line);
            });
        });
    }
}

function sendToBackend() {
    const neurons = document
        .getElementById("neuronsPerLayer")
        .value
        .split(",")
        .map(n => parseInt(n.trim()));

    fetch("/api/network", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ neurons })
    })
    .then(res => res.json())
    .then(data => {
        console.log(data);

        if (data.status !== "success") {
            alert("Backend error: " + data.message);
            return;
        }

        networkWeights = data.weights;

        renderNetwork(); // ✅ FIX: correct function

        updateOutput(data);
    })
    .catch(err => console.error(err));
}

function trainNetwork() {
    fetch('/api/train', { method: 'POST' })
    .then(res => res.json())
    .then(data => {
        console.log(data);

        if (data.status !== "trained") {
            alert("Training error: " + data.message);
            return;
        }

        networkWeights = data.weights;

        renderNetwork(); // ✅ FIX

        updateOutput(data);
    })
    .catch(err => console.error(err));
}

function updateOutput(data) {
    const box = document.getElementById("outputBox");

    if (!data.output) return;

    box.innerHTML = "<h3>Prediction Output</h3>";

    if (data.prediction !== undefined) {
        box.innerHTML += `<b>Predicted Digit: ${data.prediction}</b><br><br>`;
    }

    box.innerHTML += data.output[0]
        .map((val, i) => `Neuron ${i+1}: ${Number(val).toFixed(4)}`)
        .join("<br>");
}

function highlightConnections(neuron) {
    const connected = neuronMap.get(neuron) || [];

    allLines.forEach(line => {
        if (connected.includes(line)) {
            const weight = parseFloat(line.dataset.weight || 0);

            if (weight > 0) {
                line.setAttribute("stroke", "red");
            } else {
                line.setAttribute("stroke", "blue");
            }

            line.setAttribute("stroke-width", Math.abs(weight) * 3 + 1);
        } else {
            line.setAttribute("stroke", "#ccc");
            line.setAttribute("stroke-width", "1");
        }
    });
}

function resetConnections() {
    allLines.forEach(line => {
        line.setAttribute("stroke", "black");
        line.setAttribute("stroke-width", "1");
    });
}
</script>

{% endblock %}
